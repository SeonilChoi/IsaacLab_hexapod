#
# Hexapod AMP — scaled for many concatenated demos (long motion buffer in HDF5):
# - Large motion_dataset / reply_buffer so reference + replay cover more frames.
# - Stronger discriminator; more PPO epochs; longer trainer timesteps.
# If CUDA OOM: lower discriminator_batch_size, amp_batch_size, or motion_dataset.memory_size.
#
# Headless train + TensorBoard (no viewport; watch losses in TB):
#   ./isaaclab.sh -p scripts/skrl/train.py --headless --no-sim-render --task Template-Hexapod-AMP-Mimic-Direct-v0 --algorithm AMP
#   tensorboard --logdir logs/skrl/hexapod_amp_mimic

seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -2.9
    fixed_log_std: True
    network:
      - name: net
        input: OBSERVATIONS
        layers: [1024, 512]
        activations: relu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [1024, 512]
        activations: relu
    output: ONE
  discriminator:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [1024, 512]
        activations: relu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

motion_dataset:
  class: RandomMemory
  memory_size: 1200000

reply_buffer:
  class: RandomMemory
  memory_size: 3000000

agent:
  class: AMP
  # Larger → richer on-policy segment per update; costs more GPU RAM (scales with num_envs).
  rollouts: 64
  learning_epochs: 10
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 5.0e-05
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  amp_state_preprocessor: RunningStandardScaler
  amp_state_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.0
  value_loss_scale: 2.5
  discriminator_loss_scale: 8.0
  amp_batch_size: 1024
  # Imitation only: policy reward from discriminator (style). No env task term.
  task_reward_weight: 0.0
  style_reward_weight: 1.0
  discriminator_batch_size: 8192
  discriminator_reward_scale: 2.5
  discriminator_logit_regularization_scale: 0.06
  discriminator_gradient_penalty_scale: 7.0
  discriminator_weight_decay_scale: 1.0e-04
  time_limit_bootstrap: False
  experiment:
    directory: "hexapod_amp_mimic"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 350000
  environment_info: log
